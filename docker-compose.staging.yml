# docker-compose.staging.yml — Staging overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  web:
    env_file: .env.staging
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    environment:
      - APP_ENV=staging
      - RLS_ENFORCEMENT_ENABLED=true
      - CLAMAV_ENABLED=true
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310

  worker:
    env_file: .env.staging
    command: >
      celery -A app.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
        --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
        --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD_KB:-1048576}
        --queues=celery,bulk
    restart: always
    environment:
      - RLS_ENFORCEMENT_ENABLED=true
      - CELERY_TASK_SOFT_TIME_LIMIT_SECONDS=${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-300}
      - CELERY_TASK_TIME_LIMIT_SECONDS=${CELERY_TASK_TIME_LIMIT_SECONDS:-360}

  db:
    environment:
      - POSTGRES_PASSWORD=staging_password_change_me
      - POSTGRES_DB=unihr_saas_staging
    restart: always

  redis:
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    restart: always

  clamav:
    image: clamav/clamav:stable
    restart: always
    expose:
      - "3310"
