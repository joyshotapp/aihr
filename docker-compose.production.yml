# docker-compose.production.yml — Production overrides for base docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# NOTE: Prefer using docker-compose.prod.yml (standalone) for production.
#       This file is a lightweight override for the dev docker-compose.yml.

services:
  web:
    env_file: .env.production
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --log-level warning
    restart: always
    environment:
      - APP_ENV=production
      - RLS_ENFORCEMENT_ENABLED=true
      - CLAMAV_ENABLED=true
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - RATE_LIMIT_ENABLED=true
      - ADMIN_IP_WHITELIST_ENABLED=true
    # Remove source code mount — use baked-in image
    volumes: []

  worker:
    env_file: .env.production
    command: >
      celery -A app.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
        --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
        --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD_KB:-1048576}
        --queues=celery,bulk
    restart: always
    environment:
      - APP_ENV=production
      - RLS_ENFORCEMENT_ENABLED=true
      - CELERY_TASK_SOFT_TIME_LIMIT_SECONDS=${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-300}
      - CELERY_TASK_TIME_LIMIT_SECONDS=${CELERY_TASK_TIME_LIMIT_SECONDS:-360}
    volumes: []
    mem_limit: 2g

  db:
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-unihr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # No external port in production
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unihr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    # No external port in production
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    restart: always

  clamav:
    image: clamav/clamav:stable
    restart: always
    expose:
      - "3310"
