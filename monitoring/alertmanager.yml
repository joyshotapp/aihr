global:
  resolve_timeout: 5m
  smtp_smarthost: ${ALERTMANAGER_SMTP_SMARTHOST}
  smtp_from: ${ALERTMANAGER_SMTP_FROM}
  smtp_auth_username: ${ALERTMANAGER_SMTP_AUTH_USERNAME}
  smtp_auth_password: ${ALERTMANAGER_SMTP_AUTH_PASSWORD}

route:
  receiver: ops-email
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: ops-critical
    - matchers:
        - severity="warning"
      receiver: ops-email

receivers:
  - name: ops-email
    email_configs:
      - to: ${ALERTMANAGER_EMAIL_TO}
        send_resolved: true

  - name: ops-critical
    email_configs:
      - to: ${ALERTMANAGER_EMAIL_TO}
        send_resolved: true
    slack_configs:
      - api_url: ${ALERTMANAGER_SLACK_WEBHOOK_URL}
        channel: ${ALERTMANAGER_SLACK_CHANNEL}
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"